name: LlamaIOS
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  LlamaSwift:
    url: https://github.com/mattt/llama.swift
    from: 2.8683.0
settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
targets:
  LlamaIOS:
    type: application
    platform: iOS
    sources:
      - path: LlamaIOS
    dependencies:
      - package: LlamaSwift
        product: LlamaSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.llama-ios
        INFOPLIST_FILE: LlamaIOS/Supporting/Info.plist
        TARGETED_DEVICE_FAMILY: 1,2
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  LlamaIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LlamaIOSTests
    dependencies:
      - target: LlamaIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.llama-ios.tests
        INFOPLIST_FILE: LlamaIOSTests/Info.plist
